name: security

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-groups --frozen
      - run: uv run --frozen bandit -c bandit.yaml -r src
      - run: uv run --frozen pip-audit --skip-editable

  # osv-scanner is a standalone Go binary (not a PyPI package), so it can't
  # go through uv -- it's wired in as Google's official reusable workflow
  # instead, scanning uv.lock directly.
  osv-scanner:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --lockfile=./uv.lock
