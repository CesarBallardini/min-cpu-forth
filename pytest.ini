[pytest]
addopts = -ra --strict-markers -m 'not e2e and not snapshot'
testpaths = tests
markers =
    unit: fast tests with no external dependencies
    integration: tests that need a real database or service
    bdd: behavior-driven acceptance tests (pytest-bdd, Gherkin)
    e2e: end-to-end tests against a running instance (Playwright)
    snapshot: snapshot tests, excluded by default, run on demand
